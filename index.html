<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guiones Locatel - Actualización de Datos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Generador de Guiones Operativos</h1>
        </header>

        <div class="grid">
            <section class="form-section">
                <h2>Datos del Solicitante</h2>
                <div class="input-group">
                    <label for="nombreSol">Nombre completo:</label>
                    <input type="text" id="nombreSol" placeholder="Ej. Juan Pérez">
                </div>
                <div class="input-group">
                    <label for="curpSol">CURP:</label>
                    <input type="text" id="curpSol" placeholder="Ingrese CURP">
                </div>
                <div class="input-group">
                    <label for="contactoSol">Número de celular o Correo:</label>
                    <input type="text" id="contactoSol" placeholder="Ej. 5512345678 o correo@ejemplo.com">
                </div>

                <h2>Datos de la Tercera Cuenta</h2>
                <div class="input-group">
                    <label for="nombreTer">Nombre completo (Tercero):</label>
                    <input type="text" id="nombreTer" placeholder="Ej. María López">
                </div>
                <div class="input-group">
                    <label for="curpTer">CURP (Tercero):</label>
                    <input type="text" id="curpTer" placeholder="Ingrese CURP del tercero">
                </div>
            </section>

            <section class="output-section">
                <h2>Guiones Generados</h2>
                
                <div class="script-card">
                    <div class="card-header">
                        <h3>CON CUENTA LLAVE</h3>
                        <button onclick="copiarTexto('outputCon')" class="btn-copy">Copiar</button>
                    </div>
                    <div id="outputCon" class="script-content"></div>
                </div>

                <div class="script-card">
                    <div class="card-header">
                        <h3>SIN CUENTA LLAVE</h3>
                        <button onclick="copiarTexto('outputSin')" class="btn-copy">Copiar</button>
                    </div>
                    <div id="outputSin" class="script-content"></div>
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
