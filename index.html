<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guiones Locatel - Sistema</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <h2>Iniciar Sesión</h2>
            <p id="loginError" class="error-msg"></p>
            
            <div class="input-group gender-group">
                <label class="animated-label">⚠️ IMPORTANTE: Selecciona si Eres...</label>
                <div class="cuenta-selector gender-selector">
                    <input type="radio" id="generoM" name="generoOperador" value="M" checked>
                    <label for="generoM">Operador</label>
                    <input type="radio" id="generoF" name="generoOperador" value="F">
                    <label for="generoF">Operadora</label>
                </div>
            </div>

            <div class="input-group">
                <label for="loginUser">Usuario:</label>
                <input type="text" id="loginUser" placeholder="Tu usuario">
            </div>
            <div class="input-group">
                <label for="loginPass">Contraseña:</label>
                <input type="password" id="loginPass" placeholder="Tu contraseña">
            </div>
            <button id="btnLogin" class="btn-primary">Ingresar</button>
        </div>
    </div>

    <div id="appScreen" class="container" style="display: none;">
        <header class="app-header">
            <h1>Generador de Guiones Operativos</h1>
            <button id="btnLogout" class="btn-logout">Cerrar Sesión</button>
        </header>

        <div class="grid">
            <section class="form-section">
                <div class="cuenta-selector">
                    <input type="radio" id="conLlave" name="tipoCuenta" value="con" checked>
                    <label for="conLlave">CON Cuenta Llave</label>
                    <input type="radio" id="sinLlave" name="tipoCuenta" value="sin">
                    <label for="sinLlave">SIN Cuenta Llave</label>
                </div>

                <h2>Datos del Solicitante</h2>
                <div class="input-group">
                    <label for="nombreSol">Nombre completo:</label>
                    <input type="text" id="nombreSol" placeholder="Ej. Juan Pérez">
                </div>
                
                <h2>Medio a registrar</h2>
                <div class="cuenta-selector">
                    <input type="radio" id="tipoCelular" name="tipoMedio" value="celular" checked>
                    <label for="tipoCelular">Número de Celular</label>
                    <input type="radio" id="tipoCorreo" name="tipoMedio" value="correo">
                    <label for="tipoCorreo">Correo Electrónico</label>
                </div>

                <h2>Datos de la Tercera Cuenta</h2>
                <div class="input-group">
                    <label for="nombreTer">Nombre completo (Tercero):</label>
                    <input type="text" id="nombreTer" placeholder="Ej. María López">
                </div>
            </section>

            <section class="output-section">
                <h2>Guion Generado</h2>
                <div class="script-card">
                    <div class="card-header">
                        <h3 id="scriptTitulo">CON CUENTA LLAVE</h3>
                    </div>
                    <div id="outputScript" class="script-content"></div>
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
