<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guiones Locatel - Actualización de Datos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Generador de Guiones Operativos</h1>
        </header>

        <div class="grid">
            <section class="form-section">
                
                <div class="cuenta-selector">
                    <input type="radio" id="conLlave" name="tipoCuenta" value="con" checked>
                    <label for="conLlave">CON Cuenta Llave</label>
                    
                    <input type="radio" id="sinLlave" name="tipoCuenta" value="sin">
                    <label for="sinLlave">SIN Cuenta Llave</label>
                </div>

                <h2>Datos del Solicitante</h2>
                <div class="input-group">
                    <label for="nombreSol">Nombre completo:</label>
                    <input type="text" id="nombreSol" placeholder="Ej. Juan Pérez">
                </div>
                <div class="input-group">
                    <label for="contactoSol">Número de celular o Correo:</label>
                    <input type="text" id="contactoSol" placeholder="Ej. 5512345678 o correo@ejemplo.com">
                </div>

                <h2>Datos de la Tercera Cuenta</h2>
                <div class="input-group">
                    <label for="nombreTer">Nombre completo (Tercero):</label>
                    <input type="text" id="nombreTer" placeholder="Ej. María López">
                </div>
            </section>

            <section class="output-section">
                <h2>Guion Generado</h2>
                
                <div class="script-card">
                    <div class="card-header">
                        <h3 id="scriptTitulo">CON CUENTA LLAVE</h3>
                    </div>
                    <div id="outputScript" class="script-content"></div>
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
